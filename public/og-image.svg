<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Monitor Ambient Light logo">
  <defs>
    <linearGradient id="ambientGradient" x1="24" y1="28" x2="220" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="45%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <linearGradient id="innerGlow" x1="64" y1="72" x2="192" y2="184" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#c4b5fd" stop-opacity="0.2" />
    </linearGradient>
    <filter id="outerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.51
                0 0 0 0 0.55
                0 0 0 0 0.98
                0 0 0 0.35 0"
        result="glow"
      />
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect x="20" y="20" width="216" height="216" rx="56" fill="#020617" />
  <rect x="22" y="22" width="212" height="212" rx="54" fill="none" stroke="url(#ambientGradient)" stroke-width="4" opacity="0.9" />

  <g filter="url(#outerGlow)">
    <path
      d="M64 146c0-34.242 27.758-62 62-62h36c16.569 0 30 13.431 30 30v0c0 16.569-13.431 30-30 30h-54"
      fill="none"
      stroke="url(#ambientGradient)"
      stroke-width="22"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <path
      d="M84 174h88"
      fill="none"
      stroke="url(#ambientGradient)"
      stroke-width="12"
      stroke-linecap="round"
      opacity="0.95"
    />
    <circle cx="164" cy="114" r="10" fill="url(#innerGlow)" />
  </g>

  <path d="M77 93c13-18 31-29 56-29" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="6" stroke-linecap="round" />
  <path d="M95 114c7-10 18-16 31-16" fill="none" stroke="#ffffff" stroke-opacity="0.8" stroke-width="5" stroke-linecap="round" />

</svg>
