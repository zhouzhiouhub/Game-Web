<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gaming RGB Software pricing Open Graph image">
  <defs>
    <linearGradient id="bgGradient" x1="96" y1="42" x2="1100" y2="594" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="ambientGradient" x1="164" y1="102" x2="1028" y2="532" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="45%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28" />
    </filter>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#bgGradient)" />
  <circle cx="182" cy="116" r="132" fill="#f472b6" fill-opacity="0.14" filter="url(#softGlow)" />
  <circle cx="1030" cy="122" r="132" fill="#22d3ee" fill-opacity="0.12" filter="url(#softGlow)" />
  <circle cx="918" cy="516" r="158" fill="#818cf8" fill-opacity="0.16" filter="url(#softGlow)" />

  <rect x="40" y="40" width="1120" height="550" rx="30" fill="none" stroke="url(#ambientGradient)" stroke-opacity="0.34" stroke-width="2" />

  <text x="88" y="120" fill="#e2e8f0" font-size="24" font-family="Segoe UI, Arial, sans-serif" letter-spacing="3">PRICING CONCEPT</text>
  <rect x="88" y="188" width="166" height="38" rx="19" fill="#111827" fill-opacity="0.9" stroke="url(#ambientGradient)" stroke-opacity="0.5" />
  <text x="122" y="213" fill="#f8fafc" font-size="18" font-family="Segoe UI, Arial, sans-serif" letter-spacing="2.4">UNUSED ASSET</text>

  <text x="88" y="308" fill="#f8fafc" font-size="72" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Open source.</text>
  <text x="88" y="384" fill="#f8fafc" font-size="72" font-weight="700" font-family="Segoe UI, Arial, sans-serif">No subscription gate.</text>
  <text x="88" y="450" fill="#cbd5e1" font-size="30" font-family="Segoe UI, Arial, sans-serif">Reserved OG concept only. The public `/pricing` route stays disabled after the earlier cleanup.</text>

  <g>
    <rect x="772" y="144" width="306" height="282" rx="28" fill="#0b1220" fill-opacity="0.96" stroke="#334155" stroke-opacity="0.78" />
    <rect x="808" y="188" width="234" height="58" rx="18" fill="#0f172a" stroke="#f472b6" stroke-opacity="0.55" />
    <text x="868" y="224" fill="#f8fafc" font-size="28" font-family="Segoe UI, Arial, sans-serif">MIT License</text>
    <rect x="808" y="266" width="234" height="58" rx="18" fill="#0f172a" stroke="#818cf8" stroke-opacity="0.55" />
    <text x="866" y="302" fill="#f8fafc" font-size="28" font-family="Segoe UI, Arial, sans-serif">GitHub Releases</text>
    <rect x="808" y="344" width="234" height="58" rx="18" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.55" />
    <text x="853" y="380" fill="#f8fafc" font-size="28" font-family="Segoe UI, Arial, sans-serif">Community Support</text>
  </g>
</svg>
