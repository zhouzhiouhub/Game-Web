<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Gaming RGB Software features Open Graph image">
  <defs>
    <linearGradient id="bgGradient" x1="100" y1="56" x2="1110" y2="604" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#030712" />
      <stop offset="50%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#111827" />
    </linearGradient>
    <linearGradient id="ambientGradient" x1="174" y1="102" x2="1014" y2="538" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f472b6" />
      <stop offset="45%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#22d3ee" />
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="28" />
    </filter>
  </defs>

  <rect width="1200" height="630" rx="36" fill="url(#bgGradient)" />
  <circle cx="180" cy="140" r="136" fill="#f472b6" fill-opacity="0.14" filter="url(#softGlow)" />
  <circle cx="1040" cy="132" r="128" fill="#22d3ee" fill-opacity="0.12" filter="url(#softGlow)" />
  <circle cx="912" cy="520" r="168" fill="#818cf8" fill-opacity="0.16" filter="url(#softGlow)" />

  <rect x="40" y="40" width="1120" height="550" rx="30" fill="none" stroke="url(#ambientGradient)" stroke-opacity="0.34" stroke-width="2" />

  <g>
    <rect x="88" y="90" width="74" height="74" rx="20" fill="#020617" />
    <rect x="90" y="92" width="70" height="70" rx="19" fill="none" stroke="url(#ambientGradient)" stroke-width="2" opacity="0.92" />
    <path d="M106 136c0-12.86 10.43-23.29 23.29-23.29h13.52a11.27 11.27 0 0 1 0 22.54h-20.28" fill="none" stroke="url(#ambientGradient)" stroke-width="8.8" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M114 147h33" fill="none" stroke="url(#ambientGradient)" stroke-width="4.8" stroke-linecap="round" opacity="0.96" />
    <circle cx="143" cy="124" r="4" fill="#ffffff" fill-opacity="0.9" />
  </g>

  <text x="188" y="120" fill="#e2e8f0" font-size="24" font-family="Segoe UI, Arial, sans-serif" letter-spacing="3">FEATURE OVERVIEW</text>
  <rect x="88" y="188" width="188" height="38" rx="19" fill="#111827" fill-opacity="0.9" stroke="url(#ambientGradient)" stroke-opacity="0.5" />
  <text x="120" y="213" fill="#f8fafc" font-size="18" font-family="Segoe UI, Arial, sans-serif" letter-spacing="2.4">FEATURES PAGE</text>

  <text x="88" y="308" fill="#f8fafc" font-size="72" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Control the full RGB stack.</text>
  <text x="88" y="382" fill="#cbd5e1" font-size="30" font-family="Segoe UI, Arial, sans-serif">Scene editor, game sync, cloud sync, and device orchestration in one surface.</text>

  <g>
    <rect x="742" y="122" width="360" height="94" rx="24" fill="#0f172a" stroke="#f472b6" stroke-opacity="0.5" />
    <text x="776" y="164" fill="#f8fafc" font-size="30" font-family="Segoe UI, Arial, sans-serif">Visual Effect Editor</text>
    <text x="776" y="194" fill="#94a3b8" font-size="20" font-family="Segoe UI, Arial, sans-serif">Layered scenes, responsive palettes, reusable presets.</text>

    <rect x="742" y="238" width="360" height="94" rx="24" fill="#0f172a" stroke="#818cf8" stroke-opacity="0.5" />
    <text x="776" y="280" fill="#f8fafc" font-size="30" font-family="Segoe UI, Arial, sans-serif">Game and App Sync</text>
    <text x="776" y="310" fill="#94a3b8" font-size="20" font-family="Segoe UI, Arial, sans-serif">Reactive lighting hooks for focus, combat, and alerts.</text>

    <rect x="742" y="354" width="360" height="94" rx="24" fill="#0f172a" stroke="#22d3ee" stroke-opacity="0.5" />
    <text x="776" y="396" fill="#f8fafc" font-size="30" font-family="Segoe UI, Arial, sans-serif">Cloud and Plugin Paths</text>
    <text x="776" y="426" fill="#94a3b8" font-size="20" font-family="Segoe UI, Arial, sans-serif">Backup scenes, share builds, extend workflows safely.</text>
  </g>

  <text x="88" y="504" fill="#94a3b8" font-size="20" font-family="Segoe UI, Arial, sans-serif">Built for page-specific previews across social cards and messaging embeds.</text>
